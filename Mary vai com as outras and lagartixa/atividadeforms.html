<!DOCTYPE >
<html>
    <head>
        <title>Formulário</title>
        <h1>Sobre você, digite:</h1>
    <body>
        <form>
        <label>Nome:</label>
        <input type="text">
        <label>Email:</label>
        <input type="email">
        <label>Senha:</label>
        <input type="password">
        <input type="reset" value="Limpar">
        <input type="submit" value="Enviar">
            <br><br><label>O que você prefere?</label><br><br>
            <input type="checkbox"> Assistir
            <input type="checkbox"> Estudar
            <input type="checkbox"> Andar de bicicleta
            <input type="checkbox"> Se arrumar
           <br><br><label>Qual horário você prefere fazer:</label><br><br>
           <input type="radio" name="turno"> Manhã
           <input type="radio" name="turno"> Tarde
           <input type="radio" name="turno"> Noite
        </form>
    </body>
</html>
